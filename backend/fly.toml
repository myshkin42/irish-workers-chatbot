# fly.toml app configuration file generated for irish-workers-chatbot on 2026-02-24T18:09:32Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'irish-workers-chatbot'
primary_region = 'lhr'

[build]
  dockerfile = 'Dockerfile'

[mounts]
  source = 'chatbot_logs'
  destination = '/data/logs'

[env]
  ENVIRONMENT = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 25

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
